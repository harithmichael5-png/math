<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Integral Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        #result { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h3>Definite Integral</h3>
    <label>Function f(x):</label>
    <input type="text" id="func" value="x^2" placeholder="e.g. x^2 + sin(x)">
    <label>Lower Limit (a):</label>
    <input type="number" id="lower" value="0">
    <label>Upper Limit (b):</label>
    <input type="number" id="upper" value="1">
    
    <button onclick="calculate()">Calculate</button>
    
    <div id="result"></div>
</div>

<script>
    function calculate() {
        const expression = document.getElementById('func').value;
        const a = parseFloat(document.getElementById('lower').value);
        const b = parseFloat(document.getElementById('upper').value);

        try {
            // Using math.js to perform numerical integration
            // Formula: integral of f(x) from a to b
            const result = math.integral(expression, 'x', a, b);
            document.getElementById('result').innerText = "Result: " + result.toString();
        } catch (err) {
            document.getElementById('result').innerText = "Error: Invalid input";
        }
    }
</script>

</body>
</html>
